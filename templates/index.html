<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo Gallery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111315;--surface:#1c1f23;--surface2:#252930;--border:#2e333b;
  --accent:#4f8ef7;--accent-dk:#3a6fd8;--danger:#e05252;--danger-dk:#c03a3a;
  --text:#e2e6ec;--muted:#7a8494;
  --select-bg:rgba(79,142,247,.18);--select-bd:#4f8ef7;
  --sidebar-w:210px;--topbar-h:54px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;overflow:hidden}
#app{display:flex;height:100vh}
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-title{padding:18px 16px 12px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
#cat-list{flex:1;overflow-y:auto;padding:0 8px 16px}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 10px;background:transparent;border:none;border-radius:8px;color:var(--text);cursor:pointer;font-size:14px;transition:background .15s}
.cat-btn:hover{background:var(--surface2)}
.cat-btn.active{background:rgba(79,142,247,.18);color:var(--accent);font-weight:600}
.cat-count{font-size:11px;color:var(--muted);background:var(--surface2);padding:1px 7px;border-radius:20px}
.cat-btn.active .cat-count{background:rgba(79,142,247,.25);color:var(--accent)}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
#cat-label{font-size:16px;font-weight:600;color:var(--text)}
#spacer{flex:1}
#sel-badge{display:none;align-items:center;gap:6px;padding:5px 14px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);border-radius:20px;color:var(--accent);font-weight:600;font-size:13px}
#sel-badge.show{display:flex}
#sel-count{font-size:15px;min-width:22px;text-align:center}
#btn-delete{display:none;align-items:center;gap:8px;padding:8px 18px;background:var(--danger);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
#btn-delete:hover{background:var(--danger-dk)}
#btn-delete:active{transform:scale(.97)}
#btn-delete.show{display:flex}
#btn-clear{display:none;padding:7px 14px;background:var(--surface2);border:none;border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;transition:background .15s,color .15s}
#btn-clear:hover{background:var(--border);color:var(--text)}
#btn-clear.show{display:block}
#grid-wrap{flex:1;overflow-y:auto;padding:16px;user-select:none}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card{position:relative;background:var(--surface);border:2px solid transparent;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .12s,transform .12s,box-shadow .12s}
.card:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
.card.selected{border-color:var(--select-bd)!important;background:var(--select-bg);box-shadow:0 0 0 1px var(--select-bd)}
.thumb-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s}
.thumb-wrap img.loading{opacity:0}
.card-name{padding:7px 9px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.check{position:absolute;top:8px;left:8px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.card:hover .check,.card.selected .check{opacity:1}
.card.selected .check{background:var(--accent);border-color:var(--accent)}
.check svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none}
#preview{width:0;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s ease}
#preview.open{width:420px}
#prev-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#prev-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:6px;transition:background .15s,color .15s}
#prev-close:hover{background:var(--surface2);color:var(--text)}
#prev-nav{display:flex;gap:6px}
.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s;line-height:1}
.nav-btn:hover{background:var(--border)}
.nav-btn:disabled{opacity:.3;cursor:default}
#prev-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:12px;background:#0d0f11}
#prev-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
#prev-info{flex-shrink:0;padding:12px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);word-break:break-all;line-height:1.6}
#empty{display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:280px;color:var(--muted);font-size:15px;grid-column:1/-1}
#empty svg{width:48px;height:48px;opacity:.3}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e2227;border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:10px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-title">Categories</div>
    <div id="cat-list">
    {% for c in categories %}
      <button class="cat-btn" data-cat="{{ c.name }}" onclick="loadCategory('{{ c.name }}')">
        <span>{{ c.name }}</span>
        <span class="cat-count">{{ c.count }}</span>
      </button>
    {% endfor %}
    </div>
  </aside>
  <div id="main">
    <div id="topbar">
      <span id="cat-label">Select a category</span>
      <div id="spacer"></div>
      <div id="sel-badge"><span id="sel-count">0</span><span>selected</span></div>
      <button id="btn-clear" onclick="clearSelection()">Clear</button>
      <button id="btn-delete" onclick="deleteSelected()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
        Delete Selected
      </button>
      <div style="display:flex;align-items:center;gap:8px;padding-left:8px;border-left:1px solid var(--border)">
        <span style="font-size:13px;color:var(--muted)">{{ username }}</span>
        <a href="/logout" style="padding:7px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Sign out</a>
      </div>
    </div>
    <div id="grid-wrap">
      <div id="grid">
        <div id="empty">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>No images here</span>
        </div>
      </div>
    </div>
  </div>
  <div id="preview">
    <div id="prev-head">
      <div id="prev-nav">
        <button class="nav-btn" id="btn-prev" title="Previous" onclick="prevImage()">&#8592;</button>
        <button class="nav-btn" id="btn-next" title="Next" onclick="nextImage()">&#8594;</button>
      </div>
      <button id="prev-close" onclick="closePreview()" title="Close">&#10005;</button>
    </div>
    <div id="prev-img-wrap"><img id="prev-img" src="" alt=""></div>
    <div id="prev-info"></div>
  </div>
</div>
<div id="toast"></div>
<script>
const state={category:null,page:0,loading:false,done:false,cards:[],selected:new Set(),previewIdx:-1};
let isPainting=false,paintMode=null;
const gridEl=document.getElementById('grid');
const gridWrap=document.getElementById('grid-wrap');
const preview=document.getElementById('preview');
const prevImg=document.getElementById('prev-img');
const prevInfo=document.getElementById('prev-info');
const selBadge=document.getElementById('sel-badge');
const selCount=document.getElementById('sel-count');
const btnDelete=document.getElementById('btn-delete');
const btnClear=document.getElementById('btn-clear');
const catLabel=document.getElementById('cat-label');
const toast=document.getElementById('toast');
const emptyEl=document.getElementById('empty');
const sentinel=document.createElement('div');
sentinel.id='sentinel';sentinel.style.height='40px';sentinel.style.gridColumn='1/-1';
gridEl.appendChild(sentinel);
const io=new IntersectionObserver(e=>{if(e[0].isIntersecting&&!state.loading&&!state.done)loadMore();},{root:gridWrap,threshold:0.1});
io.observe(sentinel);
function loadCategory(name){
  if(state.category===name)return;
  state.category=name;state.page=0;state.done=false;state.cards=[];state.selected.clear();
  updateUI();closePreview();catLabel.textContent=name;
  while(gridEl.firstChild&&gridEl.firstChild!==sentinel)gridEl.removeChild(gridEl.firstChild);
  emptyEl.style.display='none';gridEl.appendChild(sentinel);
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===name));
  loadMore();
}
async function loadMore(){
  if(state.loading||state.done)return;
  state.loading=true;
  try{
    const res=await fetch('/api/files/'+encodeURIComponent(state.category)+'?page='+state.page);
    const rows=await res.json();
    if(rows.length===0){state.done=true;if(state.cards.length===0)emptyEl.style.display='flex';return;}
    rows.forEach(r=>addCard(r));
    state.page++;
    if(rows.length<60)state.done=true;
  }finally{state.loading=false;}
}
const CHECK='<svg viewBox="0 0 12 10"><polyline points="1,5 4,8 11,1"/></svg>';
function addCard(row){
  const card=document.createElement('div');
  card.className='card';card.dataset.path=row.path;card.dataset.name=row.name;
  const wrap=document.createElement('div');wrap.className='thumb-wrap';
  const img=document.createElement('img');
  img.className='loading';img.dataset.src='/thumb?p='+encodeURIComponent(row.path);
  img.alt=row.name;img.draggable=false;
  img.onload=()=>img.classList.remove('loading');
  const check=document.createElement('div');check.className='check';check.innerHTML=CHECK;
  const label=document.createElement('div');label.className='card-name';label.textContent=row.name;
  wrap.appendChild(img);card.appendChild(wrap);card.appendChild(check);card.appendChild(label);
  gridEl.insertBefore(card,sentinel);
  const imgObs=new IntersectionObserver((e,o)=>{if(e[0].isIntersecting){img.src=img.dataset.src;o.disconnect();}},{root:gridWrap,rootMargin:'200px'});
  imgObs.observe(card);
  card.addEventListener('mousedown',e=>{
    if(e.button!==0)return;e.preventDefault();
    isPainting=true;paintMode=card.classList.contains('selected')?'deselect':'select';
    applyPaint(card);
  });
  card.addEventListener('mouseenter',()=>{if(isPainting)applyPaint(card);});
  card.addEventListener('dblclick',e=>{e.preventDefault();openPreview(state.cards.indexOf(card));});
  state.cards.push(card);
}
document.addEventListener('mouseup',()=>{isPainting=false;});
function applyPaint(card){
  if(paintMode==='select'){card.classList.add('selected');state.selected.add(card);}
  else{card.classList.remove('selected');state.selected.delete(card);}
  updateUI();
}
function updateUI(){
  const n=state.selected.size;
  selCount.textContent=n;
  selBadge.classList.toggle('show',n>0);
  btnDelete.classList.toggle('show',n>0);
  btnClear.classList.toggle('show',n>0);
}
function clearSelection(){state.selected.forEach(c=>c.classList.remove('selected'));state.selected.clear();updateUI();}
async function deleteSelected(){
  const paths=[...state.selected].map(c=>c.dataset.path);
  if(!paths.length)return;
  btnDelete.disabled=true;
  const orig=btnDelete.innerHTML;
  btnDelete.innerHTML='Deleting\u2026';
  try{
    const res=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paths})});
    const data=await res.json();
    state.selected.forEach(card=>{
      const idx=state.cards.indexOf(card);
      if(idx!==-1)state.cards.splice(idx,1);
      card.remove();
    });
    state.selected.clear();updateUI();
    showToast('Deleted '+data.deleted+' file'+(data.deleted!==1?'s':''));
    if(state.previewIdx>=state.cards.length)closePreview();
  }catch(err){showToast('Delete failed \u2014 '+err.message);}
  finally{btnDelete.disabled=false;btnDelete.innerHTML=orig;}
}
function openPreview(idx){
  if(idx<0||idx>=state.cards.length)return;
  state.previewIdx=idx;
  const card=state.cards[idx];
  prevImg.src='/img?p='+encodeURIComponent(card.dataset.path);
  prevInfo.textContent=card.dataset.name+'\n\n'+card.dataset.path;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===state.cards.length-1;
  preview.classList.add('open');
}
function closePreview(){preview.classList.remove('open');state.previewIdx=-1;}
function prevImage(){if(state.previewIdx>0)openPreview(state.previewIdx-1);}
function nextImage(){if(state.previewIdx<state.cards.length-1)openPreview(state.previewIdx+1);}
document.addEventListener('keydown',e=>{
  if(!preview.classList.contains('open'))return;
  if(e.key==='ArrowLeft')prevImage();
  if(e.key==='ArrowRight')nextImage();
  if(e.key==='Escape')closePreview();
});
let toastTimer;
function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),3000);
}
const firstCat=document.querySelector('.cat-btn');
if(firstCat)loadCategory(firstCat.dataset.cat);
</script>
</body>
</html>
